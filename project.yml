name: ClaudeUsage
options:
  bundleIdPrefix: de.fashion-digital
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: "Apple Development"
    CODE_SIGN_STYLE: Automatic

targets:
  ClaudeUsage:
    type: application
    platform: macOS
    sources:
      - path: ClaudeUsage
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.fashion-digital.claudeusage
        INFOPLIST_KEY_LSUIElement: true
        INFOPLIST_KEY_NSMainStoryboardFile: ""
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: true
        SWIFT_VERSION: "5.9"
    entitlements:
      path: ClaudeUsage/ClaudeUsage.entitlements
      properties:
        com.apple.security.network.client: true
schemes:
  ClaudeUsage:
    build:
      targets:
        ClaudeUsage: all
    run:
      config: Debug
      executable: ClaudeUsage
